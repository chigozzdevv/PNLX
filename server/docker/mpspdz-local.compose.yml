services:
  mpspdz-setup:
    image: ${MERKL_MPSPDZ_PARTY_IMAGE:-merkl/mpspdz-party:local}
    entrypoint: ["mpspdz-setup"]
    environment:
      MPSPDZ_INPUT_P0: ${MPSPDZ_INPUT_P0:-100000000 5100000000000}
      MPSPDZ_INPUT_P1: ${MPSPDZ_INPUT_P1:-75000000 5000000000000}
    volumes:
      - mpspdz-player-data:/opt/MP-SPDZ/Player-Data

  mpspdz-party-0:
    image: ${MERKL_MPSPDZ_PARTY_IMAGE:-merkl/mpspdz-party:local}
    depends_on:
      mpspdz-setup:
        condition: service_completed_successfully
    environment:
      MPSPDZ_PARTY_ID: "0"
      MPSPDZ_PROGRAM: ${MPSPDZ_PROGRAM:-merkl_batch_match}
    volumes:
      - mpspdz-player-data:/opt/MP-SPDZ/Player-Data

  mpspdz-party-1:
    image: ${MERKL_MPSPDZ_PARTY_IMAGE:-merkl/mpspdz-party:local}
    depends_on:
      mpspdz-setup:
        condition: service_completed_successfully
    environment:
      MPSPDZ_PARTY_ID: "1"
      MPSPDZ_PROGRAM: ${MPSPDZ_PROGRAM:-merkl_batch_match}
    volumes:
      - mpspdz-player-data:/opt/MP-SPDZ/Player-Data

  mpspdz-party-2:
    image: ${MERKL_MPSPDZ_PARTY_IMAGE:-merkl/mpspdz-party:local}
    depends_on:
      mpspdz-setup:
        condition: service_completed_successfully
    environment:
      MPSPDZ_PARTY_ID: "2"
      MPSPDZ_PROGRAM: ${MPSPDZ_PROGRAM:-merkl_batch_match}
    volumes:
      - mpspdz-player-data:/opt/MP-SPDZ/Player-Data

volumes:
  mpspdz-player-data:
